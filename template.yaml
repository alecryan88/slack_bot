AWSTemplateFormatVersion: "2010-09-09"
Description: Slack events Lambda function with SQS and LLM processing

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/slack-lambda:latest)
  SlackBotToken:
    Type: String
    NoEcho: true
    Description: Slack bot token (xoxb-...)
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key
  GitHubToken:
    Type: String
    NoEcho: true
    Description: GitHub personal access token
  SlackBotUserId:
    Type: String
    Description: Slack bot user ID (e.g. U012AB3CD) — find it via Slack API auth.test
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Description: Slack signing secret (from App credentials page)

Resources:
  # --- IAM ---
  AckLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: slack-ack-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SendToSQS
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt SlackQueue.Arn

  ProcessLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: slack-process-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ConsumeFromSQS
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SlackQueue.Arn

  # --- SQS ---
  SlackQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: slack-events-dlq
      MessageRetentionPeriod: 1209600  # 14 days

  SlackQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: slack-events
      VisibilityTimeout: 120
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SlackQueueDLQ.Arn
        maxReceiveCount: 3

  # --- Lambdas ---
  AckLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: slack-ack-handler
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      ImageConfig:
        Command: ["handler.ack_handler"]
      Role: !GetAtt AckLambdaRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SQS_QUEUE_URL: !Ref SlackQueue
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret

  ProcessLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: slack-process-handler
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      ImageConfig:
        Command: ["handler.process_handler"]
      Role: !GetAtt ProcessLambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          GITHUB_TOKEN: !Ref GitHubToken
          BOT_USER_ID: !Ref SlackBotUserId

  SQSTrigger:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt SlackQueue.Arn
      FunctionName: !GetAtt ProcessLambda.Arn
      BatchSize: 1

  # --- API Gateway ---
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: slack-lambda-api
      ProtocolType: HTTP
      Target: !GetAtt AckLambda.Arn

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AckLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint (use this as your Slack Request URL)
    Value: !GetAtt HttpApi.ApiEndpoint

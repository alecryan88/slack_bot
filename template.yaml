AWSTemplateFormatVersion: "2010-09-09"
Description: Slack Bolt Lambda with GitHub MCP and lazy listener processing

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/slack-lambda:latest)
  SlackBotToken:
    Type: String
    NoEcho: true
    Description: Slack bot token (xoxb-...)
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key
  GitHubToken:
    Type: String
    NoEcho: true
    Description: GitHub personal access token
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Description: Slack signing secret (from App credentials page)

Resources:
  # --- IAM ---
  SlackLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: slack-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SelfInvoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:slack-bolt-handler"

  # --- Lambda ---
  SlackLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: slack-bolt-handler
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      ImageConfig:
        Command: ["handler.handler"]
      Role: !GetAtt SlackLambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          GITHUB_TOKEN: !Ref GitHubToken

  # --- API Gateway ---
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: slack-bolt-api
      ProtocolType: HTTP
      Target: !GetAtt SlackLambda.Arn

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt SlackLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint (use this as your Slack Request URL)
    Value: !GetAtt HttpApi.ApiEndpoint

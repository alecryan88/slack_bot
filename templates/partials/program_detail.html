<!-- Header -->
<div class="flex items-center gap-4 mb-6">
    <button hx-get="/programs" hx-target="#content" hx-swap="innerHTML"
        class="text-sm text-blue-600 hover:underline">← Programs</button>
    <div>
        <h2 class="text-lg font-bold">{{ program['name'] }}</h2>
        {% if program['description'] %}
        <p class="text-sm text-gray-500">{{ program['description'] }}</p>
        {% endif %}
    </div>
</div>

<!-- Add Template Form -->
<form
    hx-post="/programs/{{ program['id'] }}/templates"
    hx-target="#template-rows"
    hx-swap="afterbegin"
    hx-on::after-request="this.reset()"
    class="bg-white p-6 rounded shadow mb-6 flex gap-4 items-end"
>
    <div class="flex-1">
        <label class="block text-sm font-medium mb-1">Template Name</label>
        <input name="name" required placeholder="e.g. Push, Pull, Legs"
            class="w-full border rounded px-3 py-2 text-sm" />
    </div>
    <button type="submit"
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
        Add Template
    </button>
</form>

<!-- Templates Table -->
<div class="bg-white rounded shadow overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-gray-50 text-left">
            <tr>
                <th class="p-2 border">Template</th>
                <th class="p-2 border w-32"></th>
            </tr>
        </thead>
        <tbody id="template-rows">
            {% for t in templates %}
            <tr id="template-{{ t['id'] }}">
                <td class="p-2 border">{{ t['name'] }}</td>
                <td class="p-2 border text-center">
                    <button hx-get="/templates/{{ t['id'] }}"
                            hx-target="#content" hx-swap="innerHTML"
                            class="text-blue-600 hover:underline text-xs">View</button>
                    <button hx-get="/templates/{{ t['id'] }}/edit"
                            hx-target="#template-{{ t['id'] }}" hx-swap="outerHTML"
                            class="text-blue-600 hover:underline text-xs ml-2">Edit</button>
                    <button hx-delete="/templates/{{ t['id'] }}"
                            hx-target="#template-{{ t['id'] }}" hx-swap="outerHTML"
                            hx-confirm="Delete this template?"
                            class="text-red-500 hover:underline text-xs ml-2">Delete</button>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="2" class="p-4 text-center text-gray-400">No templates yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>

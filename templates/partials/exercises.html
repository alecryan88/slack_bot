<!-- Add Exercise Form -->
<form
    hx-post="/exercises"
    hx-target="#exercise-rows"
    hx-swap="afterbegin"
    hx-on::after-request="this.reset()"
    class="bg-white p-6 rounded shadow mb-6 grid grid-cols-2 gap-4"
>
    <div>
        <label class="block text-sm font-medium mb-1">Exercise Name</label>
        <input name="name" required placeholder="e.g. Bench Press"
            class="w-full border rounded px-3 py-2 text-sm" />
    </div>
    <div>
        <label class="block text-sm font-medium mb-1">Muscle Group</label>
        <input name="muscle_group" placeholder="e.g. Chest"
            class="w-full border rounded px-3 py-2 text-sm" />
    </div>
    <div class="col-span-2">
        <button type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">
            Add Exercise
        </button>
    </div>
</form>

<!-- Exercise Table -->
<div class="bg-white rounded shadow overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-gray-50 text-left">
            <tr>
                <th class="p-2 border">Exercise</th>
                <th class="p-2 border">Muscle Group</th>
                <th class="p-2 border w-16"></th>
            </tr>
        </thead>
        <tbody id="exercise-rows">
            {% for e in exercises %}
            <tr id="exercise-{{ e['id'] }}">
                <td class="p-2 border">{{ e['name'] }}</td>
                <td class="p-2 border text-gray-500">{{ e['muscle_group'] or '—' }}</td>
                <td class="p-2 border text-center">
                    <button hx-get="/exercises/{{ e['id'] }}/progress"
                            hx-target="#content" hx-swap="innerHTML"
                            class="text-purple-600 hover:underline text-xs">Progress</button>
                    <button hx-get="/exercises/{{ e['id'] }}/edit"
                            hx-target="#exercise-{{ e['id'] }}" hx-swap="outerHTML"
                            class="text-blue-600 hover:underline text-xs ml-2">Edit</button>
                    <button hx-delete="/exercises/{{ e['id'] }}"
                            hx-target="#exercise-{{ e['id'] }}" hx-swap="outerHTML"
                            hx-confirm="Delete this exercise?"
                            class="text-red-500 hover:underline text-xs ml-2">Delete</button>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="3" class="p-4 text-center text-gray-400">No exercises yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
